name: analyze-resume

# Self-healing safety net. Every hour, finds any analysis run that never reached
# DONE — a job that ran out of free-tier LLM quota mid-pass or hit its time limit
# leaves the run PARTIAL (or stuck PROCESSING) — and resumes it to completion.
# The pipeline is resumable (finished items are skipped), so this only does the
# leftover work. A run stops being picked up once it is DONE.
#
# Cost note: runs hourly to stay light on the free Actions budget. If you want
# interrupted companies to recover faster and have the budget, tighten the cron
# (e.g. "*/30 * * * *" or "*/20 * * * *"). No harvesting happens here — it reads
# the already-harvested SourceDocs from the DB — so it's a short job.
on:
  schedule:
    - cron: "0 * * * *" # hourly, on the hour (UTC)
  workflow_dispatch:

# Never let two resume passes overlap (they'd fight over the same runs).
concurrency:
  group: analyze-resume
  cancel-in-progress: false

jobs:
  analyze-resume:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      # Cloudflare D1 over the HTTP API (lib/db.ts + prisma/seed.mts → PrismaD1Http).
      # Account + database IDs are public identifiers; only the token is secret.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "489675fbe898cd94904c654de83ade00"
      CLOUDFLARE_DATABASE_ID: "a29b643f-0b80-44af-ac1c-4a721f8345ed"
      # Analyse (OpenAI primary; free providers as fallback chain).
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      # Web research for any items still reachable that way.
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
      # MUNS Chat API — fills the remaining (NA) parameters.
      MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
      USER_INDEX: ${{ secrets.USER_INDEX }}
      CONTEXT_EMAIL: ${{ secrets.CONTEXT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — CLOUDFLARE_API_TOKEN must be set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set — point the resume job at Cloudflare D1 (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Apply the D1 schema (idempotent CREATE TABLE IF NOT EXISTS) with wrangler,
      # then idempotently upsert the checklist — self-healing on a fresh/updated D1.
      - name: Prisma generate, apply D1 schema & seed
        run: |
          npx prisma generate
          npx --yes wrangler@latest d1 execute cg-checklist20 --remote --file=./migrations/0001_init.sql --yes
          npm run db:seed

      - name: Resume unfinished runs
        run: npm run resume-incomplete
