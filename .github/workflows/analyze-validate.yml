name: analyze-validate

# Manual-only: validates the ANALYSIS CORE on REAL harvested data. It connects to
# the persistent database (Cloudflare D1, via the CLOUDFLARE_API_TOKEN secret), finds the
# company's latest run, and evaluates a focused set of checklist items spanning
# every evidence path (Tier-1 numeric, numeric-from-document, qualitative, web
# fallback / not-available). Run a harvest first (harvest-validate) so the run
# has SourceDocs to read. No schedule yet.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker to analyze (must already be harvested)"
        required: true
        default: TCS
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Cloudflare D1 over the HTTP API — holds the harvested SourceDocs (required).
      # Account + database IDs are public identifiers; only the token is secret.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "489675fbe898cd94904c654de83ade00"
      CLOUDFLARE_DATABASE_ID: "a29b643f-0b80-44af-ac1c-4a721f8345ed"
      # LLM providers (engine routing): OpenAI (paid) is PRIMARY for every role;
      # the free providers stay as a safety-net fallback chain.
      # Firecrawl/Scrape.do = web fallback for sparse items.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — CLOUDFLARE_API_TOKEN must be set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Analysis reads Cloudflare D1, which holds the harvested SourceDocs."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Apply the D1 schema (idempotent CREATE TABLE IF NOT EXISTS) with wrangler,
      # then idempotently upsert the checklist — so the ChecklistItems exist first.
      - name: Prisma generate, apply D1 schema & seed
        run: |
          npx prisma generate
          npx --yes wrangler@latest d1 execute cg-checklist20 --remote --file=./migrations/0001_init.sql --yes
          npm run db:seed

      # Inputs are passed via env (not interpolated) to avoid shell injection.
      - name: Analyze ${{ inputs.ticker }}
        env:
          TICKER: ${{ inputs.ticker }}
        run: npm run analyze -- "$TICKER"

      - name: Upload analyze artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-${{ inputs.ticker }}
          path: analyze-report/
          if-no-files-found: warn
