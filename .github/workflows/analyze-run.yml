name: analyze-run

# Manual-only: runs the FULL 106-item, resumable, quota-aware analysis for a
# company against Cloudflare D1. Re-running continues where it stopped
# (DONE items skipped); under an exhausted free-tier quota it PARTIALs and the
# next run resumes. Harvest the ticker first (harvest-validate).
#
# Scheduling comes LATER. To run this daily, add a one-line trigger here, e.g.:
#   schedule:
#     - cron: "0 2 * * *"   # 02:00 UTC daily — drains the queue
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker (or an AnalysisRun id) to analyze. Must already be harvested."
        required: true
        default: TCS
        type: string
      force:
        description: "Re-evaluate ALL 106 items, ignoring prior DONE status (refresh after engine changes)"
        required: false
        default: false
        type: boolean

jobs:
  analyze-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Cloudflare D1 over the HTTP API (lib/db.ts + prisma/seed.mts → PrismaD1Http).
      # Account + database IDs are public identifiers; only the token is secret.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "489675fbe898cd94904c654de83ade00"
      CLOUDFLARE_DATABASE_ID: "a29b643f-0b80-44af-ac1c-4a721f8345ed"
      # Engine routing: OpenAI (paid) is PRIMARY for every role; the free
      # providers below stay as a safety-net fallback chain.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
      # MUNS Chat API — fills the remaining (NA) parameters after the normal pass.
      MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
      USER_INDEX: ${{ secrets.USER_INDEX }}
      CONTEXT_EMAIL: ${{ secrets.CONTEXT_EMAIL }}
      # Final self-audit stage: auto-corrects clear report bugs before finalizing.
      QA_REVIEW: "1"
      # Optional: force a low daily cap to exercise the PARTIAL→resume path, e.g.
      # LLM_DAILY_CAP: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — CLOUDFLARE_API_TOKEN must be set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Analysis reads/writes Cloudflare D1 (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Apply the D1 schema (idempotent CREATE TABLE IF NOT EXISTS) with wrangler,
      # then idempotently upsert the checklist — so the tables + ChecklistItems
      # exist before running, self-healing on a fresh/updated D1.
      - name: Prisma generate, apply D1 schema & seed
        run: |
          npx prisma generate
          npx --yes wrangler@latest d1 execute cg-checklist20 --remote --file=./migrations/0001_init.sql --yes
          npm run db:seed

      # Inputs are passed via env (not interpolated) to avoid shell injection.
      - name: Analyze ${{ inputs.ticker }} (all 106 items)
        env:
          TICKER: ${{ inputs.ticker }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            npm run analyze-run -- "$TICKER" --force
          else
            npm run analyze-run -- "$TICKER"
          fi

      # Fill the remaining NOT_AVAILABLE parameters via MUNS, then re-classify
      # with the existing green/red-flag logic. Skips cleanly if MUNS_TOKEN unset.
      - name: MUNS backfill ${{ inputs.ticker }} (remaining params)
        if: env.MUNS_TOKEN != ''
        env:
          TICKER: ${{ inputs.ticker }}
        run: npm run muns-backfill -- "$TICKER"

      # Final self-audit: clear report bugs, then finalize the run to DONE.
      - name: Self-audit (QA) ${{ inputs.ticker }}
        if: always()
        env:
          TICKER: ${{ inputs.ticker }}
        run: npm run qa-review -- "$TICKER"

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-run-${{ inputs.ticker }}
          path: analyze-run-report/
          if-no-files-found: warn
