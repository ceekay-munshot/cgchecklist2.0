name: analyze-company

# On-demand worker for the web app's search box. Harvests a company end-to-end
# and then runs the full 106-item analysis against the persistent Neon DB, in a
# single job. The web app dispatches this (workflow_dispatch) when a searched
# company is new or its last run is older than the 90-day freshness window; it
# then polls /api/analyze/<ticker>/status for the live progress bar.
#
# Resumable + quota-aware like analyze-run: re-running continues where it stopped.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker to harvest + analyse"
        required: true
        default: TCS
        type: string
      exchange:
        description: "Exchange hint (NSE/BSE) — optional"
        required: false
        default: ""
        type: string
      force:
        description: "Re-evaluate ALL 106 items, ignoring prior DONE status"
        required: false
        default: false
        type: boolean

jobs:
  analyze-company:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Harvest (Screener login + doc fallback + scrape providers)
      SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
      # Analyse (OpenAI primary; free providers as fallback chain)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      # MUNS Chat API — fills the remaining (NA) parameters after the normal pass.
      MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
      USER_INDEX: ${{ secrets.USER_INDEX }}
      CONTEXT_EMAIL: ${{ secrets.CONTEXT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — DATABASE_URL must be set
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set — point it at the persistent Neon DB the web app reads."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Prisma generate, migrate & seed
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed

      # Inputs via env (not interpolated) to avoid shell injection.
      - name: Harvest ${{ inputs.ticker }}
        env:
          TICKER: ${{ inputs.ticker }}
          EXCHANGE: ${{ inputs.exchange }}
        run: npm run harvest -- "$TICKER" "$EXCHANGE"

      - name: Analyse ${{ inputs.ticker }} (all 106 items)
        env:
          TICKER: ${{ inputs.ticker }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            npm run analyze-run -- "$TICKER" --force
          else
            npm run analyze-run -- "$TICKER"
          fi

      # Fill the remaining NOT_AVAILABLE parameters via MUNS, then re-classify
      # with the existing green/red-flag logic. Skips cleanly if MUNS_TOKEN unset.
      - name: MUNS backfill ${{ inputs.ticker }} (remaining params)
        if: env.MUNS_TOKEN != ''
        env:
          TICKER: ${{ inputs.ticker }}
        run: npm run muns-backfill -- "$TICKER"

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-company-${{ inputs.ticker }}
          path: analyze-run-report/
          if-no-files-found: warn
