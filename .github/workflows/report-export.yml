name: report-export

# Manual: exports a company's latest run (from Cloudflare D1) as
# downloadable files — a colour-graded Excel workbook and a self-contained HTML
# report — uploaded as an artifact. No analysis is run; this only reads existing
# results, so it's cheap and needs no LLM keys.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker (or AnalysisRun id) to export"
        required: true
        default: TCS
        type: string

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Cloudflare D1 over the HTTP API — holds the analysed run (required, read-only).
      # Account + database IDs are public identifiers; only the token is secret.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "489675fbe898cd94904c654de83ade00"
      CLOUDFLARE_DATABASE_ID: "a29b643f-0b80-44af-ac1c-4a721f8345ed"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — CLOUDFLARE_API_TOKEN must be set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set — point it at Cloudflare D1, which holds the run."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Export ${{ inputs.ticker }}
        env:
          TICKER: ${{ inputs.ticker }}
        run: npm run report-export -- "$TICKER"

      - name: Upload report files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cg-report-${{ inputs.ticker }}
          path: report-export/
          if-no-files-found: warn
