name: harvest-validate

# Manual-only: harvests the live Screener.in data end-to-end on a GitHub runner
# (open egress + creds from secrets). It writes to Cloudflare D1 (over the D1 HTTP
# API) so Screener is scraped ONCE and later analysis iterates offline. Re-running
# for the same ticker is cheap and idempotent (it reuses rows and only re-fetches
# what is missing/FAILED).
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker (e.g. TCS, RELIANCE)"
        required: true
        type: string
      exchange:
        description: "Exchange"
        required: false
        default: NSE
        type: choice
        options:
          - NSE
          - BSE

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Cloudflare D1 over the HTTP API (lib/db.ts + prisma/seed.mts → PrismaD1Http).
      # Account + database IDs are public identifiers; only the token is secret.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "489675fbe898cd94904c654de83ade00"
      CLOUDFLARE_DATABASE_ID: "a29b643f-0b80-44af-ac1c-4a721f8345ed"
      # Screener login (required for the rich Tier-1 scrape) + doc-fallback keys.
      SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — CLOUDFLARE_API_TOKEN must be set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Harvest writes to Cloudflare D1 (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Install the exact Chromium revision playwright-core expects (+ OS deps).
      - name: Install Playwright Chromium
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      # Apply the D1 schema (idempotent CREATE TABLE IF NOT EXISTS) with wrangler,
      # then idempotently upsert the checklist — self-healing on a fresh/updated D1.
      - name: Prisma generate, apply D1 schema & seed
        run: |
          npx prisma generate
          npx --yes wrangler@latest d1 execute cg-checklist20 --remote --file=./migrations/0001_init.sql --yes
          npm run db:seed

      # Inputs are passed via env (not interpolated into the shell) to avoid
      # script injection. A graceful harvest degradation exits 0 — the job stays
      # green and fetchStatus is surfaced in the report below.
      - name: Harvest ${{ inputs.ticker }}
        env:
          TICKER: ${{ inputs.ticker }}
          EXCHANGE: ${{ inputs.exchange }}
        run: npm run harvest -- "$TICKER" "$EXCHANGE"

      - name: Build harvest report (structuredData + documents)
        if: always()
        env:
          TICKER: ${{ inputs.ticker }}
        run: node --env-file-if-exists=.env --import tsx scripts/harvest-report.ts "$TICKER"

      - name: Upload harvest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-${{ inputs.ticker }}
          path: harvest-report/
          if-no-files-found: warn
