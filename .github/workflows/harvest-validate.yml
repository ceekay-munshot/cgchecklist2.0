name: harvest-validate

# Manual-only: harvests the live Screener.in data end-to-end on a GitHub runner
# (open egress + creds from secrets). By default it writes to the PERSISTENT
# database (the DATABASE_URL repo secret — hosted Neon Postgres) so Screener is
# scraped ONCE and later analysis iterates offline. Re-running for the same
# ticker is cheap and idempotent (it reuses rows and only re-fetches what is
# missing/FAILED). Flip `ephemeral` on for a throwaway smoke test against a
# fresh service-container Postgres instead.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Company ticker (e.g. TCS, RELIANCE)"
        required: true
        type: string
      exchange:
        description: "Exchange"
        required: false
        default: NSE
        type: choice
        options:
          - NSE
          - BSE
      ephemeral:
        description: "Use a throwaway Postgres service container instead of the persistent DATABASE_URL secret (smoke test only — nothing is kept)"
        required: false
        default: false
        type: boolean

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Throwaway Postgres — only USED when `ephemeral=true` (service containers
    # cannot be conditional, so it always starts; the persistent run ignores it).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cg
          POSTGRES_PASSWORD: cg
          POSTGRES_DB: cgchecklist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cg -d cgchecklist"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # DATABASE_URL is resolved at runtime (persistent secret vs ephemeral
      # service) in the "Resolve DATABASE_URL" step below — not hardcoded here.
      # Screener login (required for the rich Tier-1 scrape) + doc-fallback keys.
      SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Resolve DATABASE_URL: persistent (DATABASE_URL secret, default) unless
      # ephemeral=true (throwaway service container). Fail fast if neither is
      # available. Values come via env (not interpolated) to avoid injection;
      # GitHub auto-masks the secret in logs.
      - name: Resolve DATABASE_URL
        env:
          EPHEMERAL: ${{ inputs.ephemeral }}
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SERVICE_DATABASE_URL: postgresql://cg:cg@localhost:5432/cgchecklist?schema=public
        run: |
          if [ "$EPHEMERAL" = "true" ]; then
            echo "Using EPHEMERAL Postgres service container (nothing is kept)."
            echo "DATABASE_URL=$SERVICE_DATABASE_URL" >> "$GITHUB_ENV"
          elif [ -n "$SECRET_DATABASE_URL" ]; then
            echo "Using PERSISTENT database from the DATABASE_URL repo secret."
            echo "DATABASE_URL=$SECRET_DATABASE_URL" >> "$GITHUB_ENV"
          else
            echo "::error::DATABASE_URL secret is not set and ephemeral=false. Set the DATABASE_URL repo secret (persistent Neon) or re-run with ephemeral=true."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Install the exact Chromium revision playwright-core expects (+ OS deps).
      - name: Install Playwright Chromium
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      # migrate deploy (NEVER reset) applies pending migrations idempotently;
      # db:seed upserts the checklist idempotently — both safe on a persistent DB.
      - name: Prisma generate, migrate & seed
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed

      # Inputs are passed via env (not interpolated into the shell) to avoid
      # script injection. A graceful harvest degradation exits 0 — the job stays
      # green and fetchStatus is surfaced in the report below.
      - name: Harvest ${{ inputs.ticker }}
        env:
          TICKER: ${{ inputs.ticker }}
          EXCHANGE: ${{ inputs.exchange }}
        run: npm run harvest -- "$TICKER" "$EXCHANGE"

      - name: Build harvest report (structuredData + documents)
        if: always()
        env:
          TICKER: ${{ inputs.ticker }}
        run: node --env-file-if-exists=.env --import tsx scripts/harvest-report.ts "$TICKER"

      - name: Upload harvest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-${{ inputs.ticker }}
          path: harvest-report/
          if-no-files-found: warn
